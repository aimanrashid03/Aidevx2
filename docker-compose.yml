services:
  onlyoffice:
    image: onlyoffice/documentserver:8.1
    container_name: aidevx-onlyoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - JWT_ENABLED=false
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-changeme-in-production}
      - JWT_HEADER=Authorization
      - JWT_PREFIX=Bearer
      # Disable SSRF filter so OO can download from private Docker IPs (local dev only)
      - ALLOW_PRIVATE_IP_ADDRESS=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - supabase_net
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice
      - onlyoffice_fonts:/usr/share/fonts/truetype/custom
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  onlyoffice_data:
  onlyoffice_log:
  onlyoffice_fonts:

networks:
  default: {}
  supabase_net:
    external: true
    name: supabase_network_Aidevx2
