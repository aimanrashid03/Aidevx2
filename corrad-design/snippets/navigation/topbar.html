<!-- topbar / use when: admin app shell top header — sticky, 40px, with icon button sections -->
<!-- Source: client/src/layouts/AdminLayout.vue:196-322 -->
<!-- Key patterns: h-10 sticky, vertical dividers (w-px bg-slate-200), hover:bg-violet-600 hover:text-white fills -->

<header class="sticky top-0 z-40 flex h-10 items-center justify-between border-b border-slate-200 bg-white px-5">
  <!-- Left: Brand icon / logo -->
  <div class="flex items-center gap-1">
    <!-- App icon — gradient square with shield icon -->
    <div class="flex h-[18px] w-[18px] shrink-0 items-center justify-center rounded-md bg-gradient-to-br from-violet-600 to-violet-500">
      <!-- shield icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-[11px] w-[11px] text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
  </div>

  <!-- Right: Site title + toast region + user + settings + notifications + logout -->
  <div class="flex items-center self-stretch">
    <!-- Site title (hidden when toast is showing) -->
    <div class="flex h-full items-center overflow-hidden whitespace-nowrap">
      <span class="px-4 text-sm font-light text-slate-900">APP NAME</span>
      <span class="h-full w-px bg-slate-200"></span>
    </div>

    <!-- Toast region placeholder (inline, slides in from right) -->
    <!-- In live app, AppToastRegion component goes here -->

    <!-- User avatar + name -->
    <div class="group relative flex h-full cursor-pointer items-center gap-2 px-4 transition-colors hover:bg-violet-600">
      <!-- Avatar: gradient circle with initials -->
      <div class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-violet-600 to-violet-500 text-[10px] font-semibold text-white">
        AB
      </div>
      <div class="leading-tight">
        <p class="text-sm font-medium text-slate-700 group-hover:text-white">USER NAME</p>
        <p class="text-[11px] text-slate-500 group-hover:text-white/80">ROLE</p>
      </div>
      <!-- Tooltip -->
      <span class="pointer-events-none absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-md bg-slate-900 px-2 py-1 text-xs text-white opacity-0 shadow-lg transition-opacity group-hover:opacity-100">Profile</span>
    </div>

    <span class="h-full w-px bg-slate-200"></span>

    <!-- Settings button -->
    <div class="relative flex h-full items-stretch">
      <button class="group relative flex h-full items-center px-4 text-slate-500 transition-colors hover:bg-violet-600 hover:text-white">
        <!-- settings icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="pointer-events-none absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-md bg-slate-900 px-2 py-1 text-xs text-white opacity-0 shadow-lg transition-opacity group-hover:opacity-100">Settings</span>
      </button>
    </div>

    <span class="h-full w-px bg-slate-200"></span>

    <!-- Notifications button with dot badge -->
    <button class="group relative flex h-full items-center px-4 text-slate-500 transition-colors hover:bg-violet-600 hover:text-white">
      <!-- bell icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      <!-- notification dot -->
      <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-rose-500 ring-2 ring-white"></span>
      <span class="pointer-events-none absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-md bg-slate-900 px-2 py-1 text-xs text-white opacity-0 shadow-lg transition-opacity group-hover:opacity-100">Notifications</span>
    </button>

    <span class="h-full w-px bg-slate-200"></span>

    <!-- Logout button -->
    <button class="group relative flex h-full items-center px-4 text-slate-500 transition-colors hover:bg-violet-600 hover:text-white">
      <!-- log-out icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
      <span class="pointer-events-none absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-md bg-slate-900 px-2 py-1 text-xs text-white opacity-0 shadow-lg transition-opacity group-hover:opacity-100">Logout</span>
    </button>
  </div>
</header>
