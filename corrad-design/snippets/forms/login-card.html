<!-- login-card / use when: auth page — sign in, sign up, password reset -->
<!-- Source: client/src/views/LoginView.vue -->
<!-- Note: uses a Stripe-inspired color palette (#5469d4 blue) distinct from admin violet — intentional design choice -->

<!-- Full login page (centered, bg-[#f6f9fc]) -->
<div class="flex min-h-screen flex-col items-center justify-center bg-[#f6f9fc] px-4">
  <div class="w-full max-w-[400px]">

    <!-- Logo -->
    <div class="mb-7 flex justify-center">
      <!-- App icon — violet-to-indigo gradient (bridges auth blue and admin violet) -->
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-violet-600 to-indigo-600">
        <!-- shield icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
    </div>

    <!-- Card -->
    <div class="rounded-lg border border-[#e3e8ee] bg-white px-10 pb-10 pt-8 shadow-[0_2px_4px_rgba(0,0,0,0.05),0_1px_2px_rgba(0,0,0,0.06)]">
      <h1 class="mb-1 text-center text-xl font-semibold tracking-tight text-[#1a1f36]">Sign in to your account</h1>
      <p class="mb-8 text-center text-[13px] text-[#697386]">APP NAME Dashboard</p>

      <!-- Form -->
      <form class="space-y-5">
        <!-- Email field -->
        <div class="space-y-1.5">
          <label class="text-[13px] font-medium text-[#1a1f36]">Email</label>
          <input
            type="email"
            placeholder="you@example.com"
            class="w-full rounded-md border border-[#d8dee4] bg-white px-3 py-[9px] text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow placeholder:text-[#a3acb9] focus:border-[#5469d4] focus:outline-none focus:ring-2 focus:ring-[#5469d4]/20"
          />
        </div>

        <!-- Password field with show/hide -->
        <div class="space-y-1.5">
          <label class="text-[13px] font-medium text-[#1a1f36]">Password</label>
          <div class="relative">
            <input
              type="password"
              placeholder="Enter your password"
              class="w-full rounded-md border border-[#d8dee4] bg-white px-3 py-[9px] pr-10 text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow placeholder:text-[#a3acb9] focus:border-[#5469d4] focus:outline-none focus:ring-2 focus:ring-[#5469d4]/20"
            />
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#a3acb9] transition-colors hover:text-[#697386]">
              <!-- eye icon -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Error message (show when login fails) -->
        <div class="flex items-center gap-2 rounded-md border border-[#f8d7da] bg-[#fdf2f2] px-3.5 py-2.5 text-[13px] text-[#cd3d64]">
          <!-- alert-circle icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          Invalid email or password. Please try again.
        </div>

        <!-- Submit button — Stripe blue -->
        <button
          type="submit"
          class="flex w-full items-center justify-center gap-2 rounded-md bg-[#5469d4] px-4 py-[9px] text-sm font-medium text-white shadow-[0_1px_2px_rgba(0,0,0,0.08),0_2px_4px_rgba(0,0,0,0.04)] transition-all hover:bg-[#4558b8]"
        >
          Continue
          <!-- arrow-right icon -->
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>
    </div>

    <!-- Footer copyright -->
    <p class="mt-8 text-center text-[12px] text-[#8792a2]">&copy; 2025 APP NAME</p>
  </div>
</div>
