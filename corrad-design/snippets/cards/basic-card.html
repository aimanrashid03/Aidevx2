<!-- basic-card / use when: any contained content block — settings panels, info sections, list containers -->

<!-- Default card -->
<div class="rounded-lg border border-slate-200 bg-white shadow-sm p-4">
  <h3 class="text-base font-semibold text-slate-900">CARD TITLE</h3>
  <p class="mt-1 text-sm text-slate-600">CARD DESCRIPTION or body content goes here.</p>
</div>

<!-- Card with header divider -->
<div class="rounded-lg border border-slate-200 bg-white shadow-sm overflow-hidden">
  <div class="border-b border-slate-200 px-4 py-3">
    <h3 class="text-sm font-semibold text-slate-900">SECTION TITLE</h3>
  </div>
  <div class="p-4">
    <p class="text-sm text-slate-600">CONTENT</p>
  </div>
</div>

<!-- Clickable card — navigates somewhere -->
<button class="w-full text-left rounded-lg border border-slate-200 bg-white p-4 shadow-sm transition-colors hover:bg-slate-50">
  <div class="flex items-center gap-2 text-sm font-semibold text-slate-800">
    <!-- replace with relevant icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
    CARD LABEL
  </div>
  <p class="mt-1 text-xs text-slate-500">SHORT DESCRIPTION of what this card leads to.</p>
</button>

<!-- Card with footer actions -->
<div class="rounded-lg border border-slate-200 bg-white shadow-sm overflow-hidden">
  <div class="p-4">
    <h3 class="text-base font-semibold text-slate-900">CARD TITLE</h3>
    <p class="mt-1 text-sm text-slate-600">CARD BODY content.</p>
  </div>
  <div class="flex items-center justify-end gap-2 border-t border-slate-200 bg-slate-50 px-4 py-3">
    <button class="border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 rounded-lg px-3 py-1.5 text-sm font-medium shadow-sm transition-colors">Cancel</button>
    <button class="bg-slate-900 text-white hover:bg-slate-800 rounded-lg px-3 py-1.5 text-sm font-medium shadow-sm transition-colors">Save</button>
  </div>
</div>
