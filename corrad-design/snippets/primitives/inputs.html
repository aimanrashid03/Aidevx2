<!-- inputs / use when: any form field — text, select, textarea, checkbox / avoid when: non-form contexts -->
<!-- Note: inputs use a Stripe-inspired style with specific hex values — this is faithful to the source -->

<!-- Text input with label -->
<div class="space-y-1.5">
  <label class="text-[13px] font-medium text-[#1a1f36]">Email address</label>
  <input
    type="email"
    placeholder="you@example.com"
    class="w-full rounded-md border border-[#d8dee4] bg-white px-3 py-[9px] text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow placeholder:text-[#a3acb9] focus:border-[#5469d4] focus:outline-none focus:ring-2 focus:ring-[#5469d4]/20"
  />
</div>

<!-- Password input with show/hide toggle -->
<div class="space-y-1.5">
  <label class="text-[13px] font-medium text-[#1a1f36]">Password</label>
  <div class="relative">
    <input
      type="password"
      placeholder="Enter your password"
      class="w-full rounded-md border border-[#d8dee4] bg-white px-3 py-[9px] pr-10 text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow placeholder:text-[#a3acb9] focus:border-[#5469d4] focus:outline-none focus:ring-2 focus:ring-[#5469d4]/20"
    />
    <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#a3acb9] transition-colors hover:text-[#697386]">
      <!-- eye icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>
</div>

<!-- Input with hint text -->
<div class="space-y-1.5">
  <label class="text-[13px] font-medium text-[#1a1f36]">Username</label>
  <input
    type="text"
    placeholder="your_username"
    class="w-full rounded-md border border-[#d8dee4] bg-white px-3 py-[9px] text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow placeholder:text-[#a3acb9] focus:border-[#5469d4] focus:outline-none focus:ring-2 focus:ring-[#5469d4]/20"
  />
  <p class="text-[12px] text-[#697386]">Only letters, numbers, and underscores.</p>
</div>

<!-- Textarea -->
<div class="space-y-1.5">
  <label class="text-[13px] font-medium text-[#1a1f36]">Description</label>
  <textarea
    rows="4"
    placeholder="Write something..."
    class="w-full resize-none rounded-md border border-[#d8dee4] bg-white px-3 py-[9px] text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow placeholder:text-[#a3acb9] focus:border-[#5469d4] focus:outline-none focus:ring-2 focus:ring-[#5469d4]/20"
  ></textarea>
</div>

<!-- Select -->
<div class="space-y-1.5">
  <label class="text-[13px] font-medium text-[#1a1f36]">Role</label>
  <select class="w-full rounded-md border border-[#d8dee4] bg-white px-3 py-[9px] text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow focus:border-[#5469d4] focus:outline-none focus:ring-2 focus:ring-[#5469d4]/20">
    <option value="">Select a role...</option>
    <option value="admin">Administrator</option>
    <option value="editor">Editor</option>
    <option value="viewer">Viewer</option>
  </select>
</div>

<!-- Checkbox -->
<label class="flex items-center gap-2.5 text-sm text-slate-700 cursor-pointer">
  <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-violet-600 focus:ring-violet-400" />
  Remember me
</label>

<!-- Error state input -->
<div class="space-y-1.5">
  <label class="text-[13px] font-medium text-[#1a1f36]">Email address</label>
  <input
    type="email"
    value="invalid-email"
    class="w-full rounded-md border border-[#f8d7da] bg-white px-3 py-[9px] text-sm text-[#1a1f36] shadow-[0_1px_2px_rgba(0,0,0,0.04)] transition-shadow focus:outline-none focus:ring-2 focus:ring-rose-200"
  />
  <p class="text-[12px] text-[#cd3d64]">Please enter a valid email address.</p>
</div>
